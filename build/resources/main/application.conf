ktor {
    deployment {
        port = 8080
        watch = [ classes, resources ]
    }
    application {
        modules = [ com.sra.ApplicationKt.module ]
    }
}
jwt {
    secret = ${?JWT_SECRET}
    issuer = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
}
database {
    url = ${?DATABASE_URL}
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
}
