ktor {
    deployment {
        port = 8080
        sslPort = 8443
        watch = [ classes, resources ]
    }

    application {
        modules = [ com.sra.ApplicationKt.module ]
    }

    security {
        ssl {
            keyStore = keystore.jks
            keyAlias = sra-key
            keyStorePassword = sra-ssl-password
            privateKeyPassword = sra-ssl-password
        }
    }
}

jwt {
    secret = ${?JWT_SECRET}
    issuer = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
}

database {
    url = ${?DATABASE_URL}
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
}
